<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verbinde mit Freigabe...</title>
  <style>
    body {
      background: #0f1015;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .loader {
      border: 4px solid rgba(255,255,255,0.05);
      border-top: 4px solid #6366f1;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <p>Lese aktuelle Cloud-Adresse ab und verbinde zur Freigabe...</p>
  
  <script>
    function decodeHex(hex) {
      let str = '';
      for (let i = 0; i < hex.length; i += 2) {
        str += String.fromCharCode(parseInt(hex.substring(i, i + 2), 16));
      }
      return str;
    }

    const params = new URLSearchParams(window.location.search);
    const bucketId = params.get('b');
    const shareId = params.get('id');
    const hash = window.location.hash; // Enthält den Key (z. B. #key)

    if (!bucketId || !shareId) {
      document.body.innerHTML = `<h3>Ung&uuml;ltiger Freigabelink</h3><p>Die Parameter 'b' oder 'id' fehlen.</p>`;
    } else {
      fetch(`https://keyvalue.immanuel.co/api/KeyVal/GetValue/${bucketId}/url`)
        .then(res => {
          if (!res.ok) throw new Error("Fehler beim Abrufen der URL");
          return res.json();
        })
        .then(hexData => {
          if (!hexData) throw new Error("Keine Daten vorhanden");
          const cleanUrl = decodeHex(hexData.trim());
          if (cleanUrl.startsWith("https://")) {
            // Weiterleitung an: https://xyz.trycloudflare.com/share/SHARE_ID#HASH
            window.location.replace(`${cleanUrl}/share/${shareId}${hash}`);
          } else {
            document.body.innerHTML = `<h3>Ung&uuml;ltige URL in Datenbank gefunden:</h3><p>${cleanUrl}</p>`;
          }
        })
        .catch(err => {
          document.body.innerHTML = `<h3>Verbindung fehlgeschlagen</h3><p>Die URL konnte nicht abgerufen werden. Läuft der Pi?</p>`;
        });
    }
  </script>
</body>
</html>
